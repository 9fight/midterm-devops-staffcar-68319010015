name: CD - staffcar

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine image version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || secrets.username }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN || secrets.docker_token }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Missing Docker Hub username. Add DOCKERHUB_USERNAME, DOCKER_USERNAME, or username."
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing Docker Hub token. Add DOCKERHUB_TOKEN, DOCKER_TOKEN, or docker_token."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || secrets.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN || secrets.docker_token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || secrets.username }}/staffcar-api:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || secrets.username }}/staffcar-api:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || secrets.username }}/staffcar-web:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || secrets.username }}/staffcar-web:latest
