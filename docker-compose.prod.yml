services:
  db:
    image: postgres:16-alpine
    container_name: staffcar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-staffcar}
      POSTGRES_USER: ${POSTGRES_USER:-staffcar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staffcar_password}
    volumes:
      - staffcar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-staffcar_user} -d ${POSTGRES_DB:-staffcar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME:-xenalz}/staffcar-api:v1.0.0
    container_name: staffcar-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      VERSION: ${VERSION:-1.0.0}
      PORT: 3000
      POSTGRES_DB: ${POSTGRES_DB:-staffcar}
      POSTGRES_USER: ${POSTGRES_USER:-staffcar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staffcar_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "3000:3000"

  frontend:
    image: ${DOCKERHUB_USERNAME:-xenalz}/staffcar-web:v1.0.0
    container_name: staffcar-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  staffcar_pgdata:
